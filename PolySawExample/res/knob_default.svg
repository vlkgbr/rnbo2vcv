<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="7.5mm" height="7.5mm"
     viewBox="0 0 7.5 7.5">
  <!-- Default knob (plain params) — 7.5mm diameter -->
  <circle cx="3.75" cy="3.75" r="3.3" fill="#2A2A2A" stroke="#111111" stroke-width="0.35"/>
  <circle cx="3.75" cy="3.75" r="2.5" fill="#333333"/>
  <circle cx="3.75" cy="3.75" r="0.6" fill="#555555"/>
  <!-- Indicator line at 12 o'clock -->
  <line x1="3.75" y1="1.25" x2="3.75" y2="0.55"
        stroke="#FFFFFF" stroke-width="0.45" stroke-linecap="round"/>
</svg>
