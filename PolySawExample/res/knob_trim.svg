<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="6.0mm" height="6.0mm"
     viewBox="0 0 6.0 6.0">
  <!-- Trim knob (atten_ params) — 6mm diameter, screwdriver slot -->
  <circle cx="3.0" cy="3.0" r="2.6" fill="#444444" stroke="#222222" stroke-width="0.4"/>
  <circle cx="3.0" cy="3.0" r="1.8" fill="#555555"/>
  <!-- Screwdriver slot -->
  <line x1="3.0" y1="1.5" x2="3.0" y2="4.5"
        stroke="#333333" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Indicator dot at 12 o'clock -->
  <circle cx="3.0" cy="0.7" r="0.35" fill="#FFFFFF"/>
</svg>
