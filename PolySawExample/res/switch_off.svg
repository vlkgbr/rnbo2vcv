<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="4.0mm" height="8.0mm"
     viewBox="0 0 4.0 8.0">
  <!-- Toggle switch OFF — lever down -->
  <rect x="0.3" y="0.3" width="3.4" height="7.4" rx="1.7" ry="1.7"
        fill="#333333" stroke="#222222" stroke-width="0.4"/>
  <!-- Lever (down = off) -->
  <circle cx="2.0" cy="5.5" r="1.3" fill="#888888" stroke="#666666" stroke-width="0.3"/>
</svg>
